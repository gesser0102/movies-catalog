# Este arquivo é processado como template pelo entrypoint da imagem nginx:
# ${TMDB_ACCESS_TOKEN} é substituído em runtime (envsubst). Variáveis do
# próprio nginx ($uri, $upstream_cache_status...) não são tocadas porque não
# existem no environment do container.

# Cache de borda das respostas da TMDB — compartilhado entre todos os
# usuários. 5 min é estritamente mais fresco que qualquer staleTime do app.
proxy_cache_path /var/cache/nginx/tmdb levels=1:2 keys_zone=tmdb_cache:10m
                 max_size=100m inactive=60m use_temp_path=off;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Proxy da TMDB: injeta o Bearer aqui no servidor — o token nunca chega ao
  # navegador. Mesma URL relativa que o proxy do Vite usa em dev.
  location /api/tmdb/ {
    proxy_pass https://api.themoviedb.org/3/;
    proxy_set_header Authorization "Bearer ${TMDB_ACCESS_TOKEN}";
    proxy_set_header Host api.themoviedb.org;
    proxy_ssl_server_name on;

    # A política de cache é nossa, não a do upstream.
    proxy_ignore_headers Cache-Control Expires;
    proxy_cache tmdb_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_use_stale error timeout updating;
    add_header X-Cache-Status $upstream_cache_status;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
